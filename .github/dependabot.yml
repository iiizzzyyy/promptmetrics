version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "iiizzzyyy"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/clients/node"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "iiizzzyyy"
    labels:
      - "dependencies"
      - "sdk"
    commit-message:
      prefix: "chore(deps)"
