name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          API_KEY_SALT: test-salt-for-ci

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Test CLI
        run: node dist/scripts/generate-api-key.js ci-key read,write
        env:
          API_KEY_SALT: test-salt-for-ci

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promptmetrics
          POSTGRES_PASSWORD: promptmetrics
          POSTGRES_DB: promptmetrics
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with PostgreSQL
        run: npm test
        env:
          API_KEY_SALT: test-salt-for-ci
          DATABASE_URL: postgres://promptmetrics:promptmetrics@localhost:5432/promptmetrics
