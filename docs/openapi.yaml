        version_a:
          type: string
        version_b:
          type: string
        dataset_id:
          type: integer
        metric:
          type: string
          enum: [latency, cost, win_rate]

    RunABTestRequest:
      type: object
      required: [scoresA, scoresB]
      properties:
        scoresA:
          type: array
          items:
            type: number
        scoresB:
          type: array
          items:
            type: number

    PaginatedABTestList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ABTest'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    Dataset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        row_count:
          type: integer
        schema:
          type: object
          nullable: true
        created_at:
          type: integer

    DatasetRow:
      type: object
      properties:
        id:
          type: integer
        input:
          type: object
        expectedOutput:
          type: object
          nullable: true

    DatasetWithPreview:
      allOf:
        - $ref: '#/components/schemas/Dataset'
        - type: object
          properties:
            preview:
              type: array
              items:
                $ref: '#/components/schemas/DatasetRow'

    CreateDatasetRequest:
      type: object
      required: [name, rows]
      properties:
        name:
          type: string
        rows:
          type: array
          items:
            type: object
            properties:
              input:
                type: object
              expectedOutput:
                type: object
                nullable: true

    PaginatedDatasetList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Dataset'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    ComplianceScanRequest:
      type: object
      required: [prompt_name, version_tag, text]
      properties:
        prompt_name:
          type: string
        version_tag:
          type: string
        text:
          type: string

    ComplianceScanResponse:
      type: object
      properties:
        score:
          type: number
        riskLevel:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              rule:
                type: string
              severity:
                type: string
              category:
                type: string
              matchedText:
                type: string

    ComplianceScore:
      type: object
      properties:
        id:
          type: integer
        prompt_name:
          type: string
        version_tag:
          type: string
        score:
          type: number
        risk_level:
          type: string
        violations:
          type: array
          items:
            type: object
        created_at:
          type: integer

    PaginatedComplianceScoreList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceScore'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    PlaygroundChatRequest:
      type: object
      required: [provider, model, messages]
      properties:
        provider:
          type: string
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        variables:
          type: object
        temperature:
          type: number
        maxTokens:
          type: integer
        topP:
          type: number

    PlaygroundCompletionRequest:
      type: object
      required: [provider, model, prompt]
      properties:
        provider:
          type: string
        model:
          type: string
        prompt:
          type: string
        variables:
          type: object
        temperature:
          type: number
        maxTokens:
          type: integer
        topP:
          type: number

    PlaygroundChatResponse:
      type: object
      properties:
        id:
          type: string
        model:
          type: string
        output:
          type: string
        tokensIn:
          type: integer
        tokensOut:
          type: integer
        latencyMs:
