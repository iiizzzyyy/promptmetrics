openapi: 3.0.3
info:
  title: PromptMetrics API
  description: Lightweight, self-hosted prompt registry with GitHub-backed versioning and metadata logging.
  version: 1.4.0
  contact:
    name: PromptMetrics Support
servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Returns a simple health status.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /health/deep:
    get:
      summary: Deep health check
      description: Performs a deep health check including SQLite and driver connectivity.
      security: []
      responses:
        '200':
          description: All checks passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepHealthStatus'
        '503':
          description: One or more checks failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepHealthStatus'

  /v1/prompts:
    get:
      summary: List prompts
      description: Returns a paginated list of prompt names.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: q
          in: query
          description: Search query string
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of prompts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPromptList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create a prompt
      description: Creates a new prompt version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptRequest'
      responses:
        '201':
          description: Prompt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/prompts/{name}:
    get:
      summary: Get a prompt
      description: Retrieves a prompt by name. Optionally specify a version or request rendering with variables.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: Specific version tag (semantic version)
          schema:
            type: string
        - name: render
          in: query
          description: Set to 'false' to skip Mustache variable rendering
          schema:
            type: string
            enum: ['false']
        - name: variables
          in: query
          description: Variables for Mustache rendering (when render is not false)
          schema:
            type: object
            additionalProperties:
              type: string
      responses:
        '200':
          description: Prompt content and version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/prompts/{name}/versions:
    get:
      summary: List prompt versions
      description: Returns a paginated list of versions for a given prompt.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVersionList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/logs:
    post:
      summary: Create a log entry
      description: Logs prompt execution metadata (tokens, latency, cost, etc.).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '202':
          description: Log accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/traces:
    post:
      summary: Create a trace
      description: Creates a new execution trace for observability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTraceRequest'
      responses:
        '201':
          description: Trace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/traces/{trace_id}:
    get:
      summary: Get a trace
      description: Retrieves a trace by ID, including its spans.
      parameters:
        - name: trace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/traces/{trace_id}/spans:
    post:
      summary: Create a span
      description: Adds a span to an existing trace.
      parameters:
        - name: trace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpanRequest'
      responses:
        '201':
          description: Span created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/traces/{trace_id}/spans/{span_id}:
    get:
      summary: Get a span
      description: Retrieves a specific span within a trace.
      parameters:
        - name: trace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: span_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Span details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/runs:
    get:
      summary: List runs
      description: Returns a paginated list of workflow runs.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRunList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create a run
      description: Creates a new workflow run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '201':
          description: Run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/runs/{run_id}:
    get:
      summary: Get a run
      description: Retrieves a workflow run by ID.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update a run
      description: Updates status, output, or metadata of an existing run.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRunRequest'
      responses:
        '200':
          description: Run updated (or no changes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunUpdatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/prompts/{name}/labels:
    get:
      summary: List labels
      description: Returns a paginated list of labels for a prompt.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of labels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLabelList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create a label
      description: Creates a named label pointing to a specific prompt version.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabelRequest'
      responses:
        '201':
          description: Label created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/prompts/{name}/labels/{label_name}:
    get:
      summary: Get a label
      description: Retrieves a specific label for a prompt.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: label_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Label details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete a label
      description: Removes a label from a prompt.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: label_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Label deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/evaluations:
    get:
      summary: List evaluations
      description: Returns a paginated list of evaluations.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of evaluations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvaluationList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create an evaluation
      description: Creates a new evaluation suite.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvaluationRequest'
      responses:
        '201':
          description: Evaluation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/evaluations/{id}:
    get:
      summary: Get an evaluation
      description: Retrieves an evaluation by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete an evaluation
      description: Deletes an evaluation and cascades its results.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Evaluation deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/evaluations/{id}/results:
    get:
      summary: List evaluation results
      description: Returns a paginated list of results for an evaluation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvaluationResultList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Add an evaluation result
      description: Adds a scored result to an evaluation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvaluationResultRequest'
      responses:
        '201':
          description: Result created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/audit-logs:
    get:
      summary: List audit logs
      description: Returns a paginated list of audit log entries. Requires admin scope.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/metrics/time-series:
    get:
      summary: Get time-series metrics
      description: Returns daily aggregated metrics over a time window.
      parameters:
        - name: window
          in: query
          description: Time window
          schema:
            type: string
            enum: ['7d', '30d', '90d']
            default: '30d'
      responses:
        '200':
          description: Time-series metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/metrics/prompts:
    get:
      summary: Get prompt metrics
      description: Returns aggregated metrics grouped by prompt and version.
      parameters:
        - name: window
          in: query
          description: Time window
          schema:
            type: string
            enum: ['7d', '30d', '90d']
            default: '30d'
        - name: limit
          in: query
          description: Maximum number of prompts to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Prompt metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptMetricsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/metrics/evaluations:
    get:
      summary: Get evaluation trends
      description: Returns evaluation score trends grouped by evaluation and date.
      parameters:
        - name: window
          in: query
          description: Time window
          schema:
            type: string
            enum: ['7d', '30d', '90d']
            default: '30d'
        - name: evaluation_id
          in: query
          description: Filter by specific evaluation ID
          schema:
            type: integer
      responses:
        '200':
          description: Evaluation trends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationTrendsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/metrics/activity:
    get:
      summary: Get activity summary
      description: Returns a summary of activity counts and recent runs.
      parameters:
        - name: window
          in: query
          description: Time window
          schema:
            type: string
            enum: ['7d', '30d', '90d']
            default: '30d'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Activity summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'


  /v1/ab-tests:
    get:
      summary: List A/B tests
      description: Returns a paginated list of A/B tests for the workspace.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of A/B tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedABTestList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create an A/B test
      description: Creates a new A/B test comparing two prompt versions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateABTestRequest'
      responses:
        '201':
          description: A/B test created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ABTest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/ab-tests/{id}:
    get:
      summary: Get an A/B test
      description: Retrieves an A/B test by ID, including the latest result.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: A/B test details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ABTestWithResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete an A/B test
      description: Deletes an A/B test and its results.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: A/B test deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/ab-tests/{id}/run:
    post:
      summary: Run an A/B test
      description: Executes an A/B test with provided scores for both versions.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunABTestRequest'
      responses:
        '200':
          description: A/B test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ABTestResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/ab-tests/{id}/promote:
    post:
      summary: Promote A/B test winner
      description: Promotes the winning version of an A/B test.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Promotion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  winner:
                    type: string
                    enum: [A, B, tie]
                  version:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/datasets:
    get:
      summary: List datasets
      description: Returns a paginated list of datasets.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of datasets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDatasetList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a dataset
      description: Creates a new dataset with rows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
      responses:
        '201':
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetWithPreview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/datasets/{id}:
    get:
      summary: Get a dataset
      description: Retrieves a dataset by ID with a preview of rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dataset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetWithPreview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a dataset
      description: Deletes a dataset and its rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Dataset deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/compliance/scan:
    post:
      summary: Scan text for compliance
      description: Scans prompt output text for PII and policy violations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceScanRequest'
      responses:
        '200':
          description: Scan result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceScanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/compliance/scores:
    get:
      summary: List compliance scores
      description: Returns a paginated list of compliance scores.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of compliance scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedComplianceScoreList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/compliance/scores/{id}:
    get:
      summary: Get a compliance score
      description: Retrieves a compliance score by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Compliance score details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceScore'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/playground/models:
    get:
      summary: List playground models
      description: Returns a paginated list of available LLM models.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaygroundModelList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/playground/chat:
    post:
      summary: Chat completion
      description: Runs a chat completion through the playground proxy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaygroundChatRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaygroundChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/playground/completions:
    post:
      summary: Text completion
      description: Runs a text completion through the playground proxy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaygroundCompletionRequest'
      responses:
        '200':
          description: Text completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaygroundChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/playground/chat/stream:
    post:
      summary: Stream chat completion
      description: Streams a chat completion via NDJSON.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaygroundChatRequest'
      responses:
        '200':
          description: NDJSON stream of completion chunks
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/PlaygroundStreamChunk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/evaluations/{id}/run:
    get:
      summary: List evaluation runs
      description: Returns a paginated list of evaluation runs.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of evaluation runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvalRunList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Run an evaluation
      description: Starts an evaluation run against an optional dataset.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunEvaluationRequest'
      responses:
        '201':
          description: Evaluation run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok

    DeepHealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        checks:
          type: object
          additionalProperties:
            type: string

    PromptMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
        name:
          type: string

    PromptVariable:
      type: object
      properties:
        type:
          type: string
          enum: [string, number, boolean, array, object]
        required:
          type: boolean
        default: {}

    ModelConfig:
      type: object
      properties:
        model:
          type: string
        temperature:
          type: number
          minimum: 0
          maximum: 2
        max_tokens:
          type: integer
          minimum: 1
        top_p:
          type: number
          minimum: 0
          maximum: 1
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2

    OllamaConfig:
      type: object
      properties:
        options:
          type: object
          additionalProperties: true
        keep_alive:
          type: string
        format:
          type: string

    CreatePromptRequest:
      type: object
      required: [name, version, messages]
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9-_]+$'
          maxLength: 128
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/PromptMessage'
          minItems: 1
        variables:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PromptVariable'
        model_config:
          $ref: '#/components/schemas/ModelConfig'
        ollama:
          $ref: '#/components/schemas/OllamaConfig'
        tags:
          type: array
          items:
            type: string
            maxLength: 64
          maxItems: 20

    PromptVersion:
      type: object
      properties:
        name:
          type: string
        version_tag:
          type: string
        commit_sha:
          type: string
        fs_path:
          type: string
        created_at:
          type: integer
        author:
          type: string

    PromptResponse:
      type: object
      properties:
        content:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            messages:
              type: array
              items:
                $ref: '#/components/schemas/PromptMessage'
            variables:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/PromptVariable'
            model_config:
              $ref: '#/components/schemas/ModelConfig'
            ollama:
              $ref: '#/components/schemas/OllamaConfig'
            tags:
              type: array
              items:
                type: string
        version:
          $ref: '#/components/schemas/PromptVersion'

    PaginatedPromptList:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    PaginatedVersionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PromptVersion'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    CreateLogRequest:
      type: object
      required: [prompt_name, version_tag]
      properties:
        prompt_name:
          type: string
          maxLength: 128
        version_tag:
          type: string
          maxLength: 64
        provider:
          type: string
          maxLength: 64
        model:
          type: string
          maxLength: 128
        tokens_in:
          type: integer
          minimum: 0
        tokens_out:
          type: integer
          minimum: 0
        latency_ms:
          type: integer
          minimum: 0
        cost_usd:
          type: number
          minimum: 0
        ollama_options:
          type: object
        ollama_keep_alive:
          type: string
          maxLength: 16
        ollama_format: {}
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 1024
              - type: number
              - type: boolean

    LogAcceptedResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string

    CreateTraceRequest:
      type: object
      properties:
        trace_id:
          type: string
          format: uuid
        prompt_name:
          type: string
          maxLength: 128
        version_tag:
          type: string
          maxLength: 64
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 1024
              - type: number
              - type: boolean

    TraceCreatedResponse:
      type: object
      properties:
        trace_id:
          type: string
        prompt_name:
          type: string
        version_tag:
          type: string
        status:
          type: string

    TraceResponse:
      type: object
      properties:
        trace_id:
          type: string
        prompt_name:
          type: string
        version_tag:
          type: string
        metadata:
          type: object
        created_at:
          type: integer
        spans:
          type: array
          items:
            type: object

    CreateSpanRequest:
      type: object
      required: [name, status]
      properties:
        span_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 256
        status:
          type: string
          enum: [ok, error]
        start_time:
          type: integer
          minimum: 0
        end_time:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 1024
              - type: number
              - type: boolean

    SpanCreatedResponse:
      type: object
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        name:
          type: string
        status:
          type: string

    SpanResponse:
      type: object
      properties:
        span_id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        status:
          type: string
        start_time:
          type: integer
        end_time:
          type: integer
        metadata:
          type: object
        created_at:
          type: integer

    CreateRunRequest:
      type: object
      required: [workflow_name]
      properties:
        run_id:
          type: string
          format: uuid
        workflow_name:
          type: string
          maxLength: 128
        status:
          type: string
          enum: [running, completed, failed]
        input:
          type: object
        output:
          type: object
        trace_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 1024
              - type: number
              - type: boolean

    RunCreatedResponse:
      type: object
      properties:
        run_id:
          type: string
        workflow_name:
          type: string
        status:
          type: string

    RunResponse:
      type: object
      properties:
        run_id:
          type: string
        workflow_name:
          type: string
        status:
          type: string
        input:
          type: object
        output:
          type: object
        trace_id:
          type: string
        metadata:
          type: object
        created_at:
          type: integer
        updated_at:
          type: integer

    UpdateRunRequest:
      type: object
      properties:
        status:
          type: string
          enum: [running, completed, failed]
        output:
          type: object
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 1024
              - type: number
              - type: boolean

    RunUpdatedResponse:
      type: object
      properties:
        run_id:
          type: string
        status:
          type: string

    PaginatedRunList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RunResponse'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    CreateLabelRequest:
      type: object
      required: [name, version_tag]
      properties:
        name:
          type: string
          maxLength: 128
          pattern: '^[a-zA-Z0-9_.-]+$'
        version_tag:
          type: string
          maxLength: 64

    LabelResponse:
      type: object
      properties:
        prompt_name:
          type: string
        name:
          type: string
        version_tag:
          type: string
        created_at:
          type: integer

    PaginatedLabelList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LabelResponse'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        prompt_name:
          type: string
        version_tag:
          type: string
        api_key_name:
          type: string
        ip_address:
          type: string
        timestamp:
          type: integer

    PaginatedAuditLogList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    CreateEvaluationRequest:
      type: object
      required: [name, prompt_name]
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
          maxLength: 512
        prompt_name:
          type: string
          maxLength: 128
        version_tag:
          type: string
          maxLength: 64
        criteria:
          type: object
          additionalProperties: true

    EvaluationResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        prompt_name:
          type: string
        version_tag:
          type: string
        criteria:
          type: object
        created_at:
          type: integer

    PaginatedEvaluationList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResponse'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    CreateEvaluationResultRequest:
      type: object
      required: [score]
      properties:
        run_id:
          type: string
          maxLength: 128
        score:
          type: number
          minimum: 0
          maximum: 1
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 1024
              - type: number
              - type: boolean

    EvaluationResultResponse:
      type: object
      properties:
        id:
          type: string
        evaluation_id:
          type: string
        run_id:
          type: string
        score:
          type: number
        metadata:
          type: object
        created_at:
          type: integer

    PaginatedEvaluationResultList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResultResponse'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    TimeSeriesPoint:
      type: object
      properties:
        date:
          type: string
          example: '2026-04-01'
        request_count:
          type: integer
        total_tokens:
          type: integer
        total_cost_usd:
          type: number
        avg_latency_ms:
          type: number
        p50_latency_ms:
          type: number
          nullable: true
        p95_latency_ms:
          type: number
          nullable: true
        error_rate:
          type: number

    TimeSeriesResponse:
      type: object
      properties:
        window:
          type: string
          example: '30d'
        start:
          type: integer
        end:
          type: integer
        daily:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'

    PromptMetric:
      type: object
      properties:
        prompt_name:
          type: string
        version_tag:
          type: string
        request_count:
          type: integer
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        total_cost_usd:
          type: number
        avg_latency_ms:
          type: number
        error_rate:
          type: number

    PromptMetricsResponse:
      type: object
      properties:
        window:
          type: string
          example: '30d'
        prompts:
          type: array
          items:
            $ref: '#/components/schemas/PromptMetric'

    EvaluationTrendPoint:
      type: object
      properties:
        date:
          type: string
          example: '2026-04-01'
        avg_score:
          type: number
        result_count:
          type: integer
        min_score:
          type: number
        max_score:
          type: number

    EvaluationTrend:
      type: object
      properties:
        evaluation_id:
          type: integer
        name:
          type: string
        prompt_name:
          type: string
        trend:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationTrendPoint'

    EvaluationTrendsResponse:
      type: object
      properties:
        window:
          type: string
          example: '30d'
        evaluations:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationTrend'

    ActivitySummary:
      type: object
      properties:
        total_runs:
          type: integer
        total_traces:
          type: integer
        total_logs:
          type: integer
        total_evaluations:
          type: integer
        active_prompts:
          type: integer
        failed_runs:
          type: integer

    ActivityResponse:
      type: object
      properties:
        window:
          type: string
          example: '7d'
        summary:
          $ref: '#/components/schemas/ActivitySummary'
        recent_runs:
          $ref: '#/components/schemas/PaginatedRunList'

    ABTest:
      type: object
      properties:
        id:
          type: integer
        prompt_name:
          type: string
        version_a:
          type: string
        version_b:
          type: string
        dataset_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [running, completed, cancelled]
        metric:
          type: string
        created_at:
          type: integer
        updated_at:
          type: integer
        workspace_id:
          type: string

    ABTestResult:
      type: object
      properties:
        id:
          type: integer
        ab_test_id:
          type: integer
        version_a_score:
          type: number
          nullable: true
        version_b_score:
          type: number
          nullable: true
        p_value:
          type: number
          nullable: true
        winner:
          type: string
          nullable: true
        created_at:
          type: integer
        workspace_id:
          type: string

    ABTestWithResult:
      allOf:
        - $ref: '#/components/schemas/ABTest'
        - type: object
          properties:
            latest_result:
              $ref: '#/components/schemas/ABTestResult'

    CreateABTestRequest:
      type: object
