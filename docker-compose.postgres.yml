services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptmetrics
      POSTGRES_PASSWORD: promptmetrics
      POSTGRES_DB: promptmetrics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptmetrics -d promptmetrics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
